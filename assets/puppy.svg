<svg width="130" height="110" viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="65" cy="100" rx="36" ry="5" fill="#000000" opacity="0.15">
    <animate attributeName="rx" values="36;22;36" keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.08;0.2" keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"/>

    <!-- tail -->
    <path d="M32 60 Q14 55 16 36" stroke="#D9A066" stroke-width="8" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="-10 32 60; 14 32 60; -10 32 60" dur="0.35s" repeatCount="indefinite"/>
    </path>

    <!-- back leg -->
    <path d="M40 88 L36 104" stroke="#D9A066" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="35" cy="105" rx="7" ry="4.5" fill="#F3C98B"/>

    <!-- front leg -->
    <path d="M88 90 L92 104" stroke="#D9A066" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="93" cy="105" rx="7" ry="4.5" fill="#F3C98B"/>

    <!-- body -->
    <ellipse cx="62" cy="72" rx="34" ry="21" fill="#F6D9A8"/>
    <ellipse cx="62" cy="82" rx="18" ry="10" fill="#FFF3DE"/>

    <!-- head -->
    <circle cx="100" cy="50" r="22" fill="#F6D9A8"/>

    <!-- ear (droopy, over cheek) -->
    <path d="M92 32 Q72 36 78 62 Q90 66 96 46 Z" fill="#D9A066"/>

    <!-- snout -->
    <ellipse cx="117" cy="57" rx="11" ry="7.5" fill="#FFF3DE"/>
    <ellipse cx="125" cy="55" rx="3.2" ry="2.6" fill="#3A2A1A"/>

    <!-- blush -->
    <ellipse cx="103" cy="58" rx="5" ry="3" fill="#FFA9BB" opacity="0.7"/>

    <!-- eye -->
    <circle cx="104" cy="42" r="4" fill="#2B1B12"/>
    <circle cx="105.6" cy="40.3" r="1.3" fill="#ffffff"/>

    <!-- smile -->
    <path d="M110 62 Q117 67 123 60" stroke="#B5762E" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
