<svg width="110" height="110" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="60" cy="106" rx="24" ry="5" fill="#000000" opacity="0.15">
    <animate attributeName="rx" values="24;14;24" keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.08;0.2" keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"/>

    <!-- tail -->
    <path d="M92 68 Q104 60 100 48" stroke="#D9A066" stroke-width="7" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="-8 92 68; 12 92 68; -8 92 68" dur="0.4s" repeatCount="indefinite"/>
    </path>

    <!-- back legs / paws -->
    <ellipse cx="42" cy="98" rx="8" ry="7" fill="#F3C98B"/>
    <ellipse cx="78" cy="98" rx="8" ry="7" fill="#F3C98B"/>

    <!-- body -->
    <ellipse cx="60" cy="78" rx="26" ry="20" fill="#F6D9A8"/>
    <ellipse cx="60" cy="86" rx="14" ry="10" fill="#FFF3DE"/>

    <!-- ears (floppy, rounded) -->
    <path d="M38 40 Q20 46 26 66 Q34 70 42 56 Z" fill="#D9A066"/>
    <path d="M82 40 Q100 46 94 66 Q86 70 78 56 Z" fill="#D9A066"/>

    <!-- head -->
    <circle cx="60" cy="48" r="26" fill="#F6D9A8"/>

    <!-- blush -->
    <ellipse cx="44" cy="55" rx="6" ry="4" fill="#FFA9BB" opacity="0.7"/>
    <ellipse cx="76" cy="55" rx="6" ry="4" fill="#FFA9BB" opacity="0.7"/>

    <!-- snout -->
    <ellipse cx="60" cy="56" rx="12" ry="9" fill="#FFF3DE"/>
    <ellipse cx="60" cy="53" r="3" fill="#3A2A1A"/>

    <!-- big sparkly eyes -->
    <circle cx="49" cy="45" r="5" fill="#2B1B12"/>
    <circle cx="71" cy="45" r="5" fill="#2B1B12"/>
    <circle cx="50.8" cy="43" r="1.6" fill="#ffffff"/>
    <circle cx="72.8" cy="43" r="1.6" fill="#ffffff"/>

    <!-- smile -->
    <path d="M54 60 Q60 66 66 60" stroke="#B5762E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- tongue -->
    <path d="M58 61 Q60 68 62 61" stroke="#FF8FA3" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- front paws (up front, cute) -->
    <ellipse cx="40" cy="92" rx="7" ry="6" fill="#F3C98B"/>
    <ellipse cx="80" cy="92" rx="7" ry="6" fill="#F3C98B"/>
  </g>
</svg>
